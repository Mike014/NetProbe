services:
  server:
    build: .
    command: netprobe-server
    networks:
      - netprobe

  client:
    build: .
    command: >
      sh -c "until nc -z server 8080; do sleep 1; done && netprobe-client -a server -p 8080"
    depends_on:
      - server
    networks:
      - netprobe

networks:
  netprobe:
    driver: bridge